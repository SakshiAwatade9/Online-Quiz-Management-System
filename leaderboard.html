<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>🏆 Leaderboard</h2>

    <table border="1" width="100%" id="leaderboardTable">
        <tr>
            <th>Rank</th>
            <th>Email</th>
            <th>Score</th>
        </tr>
    </table>

    <p id="noData"></p>

    <br>
    <button onclick="goBack()">Back</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
/* 🔥 Firebase Config (REQUIRED HERE ALSO) */
const firebaseConfig = {
  apiKey: "AIzaSyDpANE69WxwkTl8ZlvtwDZeUrF5N2Q0NRY",
  authDomain: "dbmsquiz-3237f.firebaseapp.com",
  projectId: "dbmsquiz-3237f",
  storageBucket: "dbmsquiz-3237f.firebasestorage.app",
  messagingSenderId: "468588534982",
  appId: "1:468588534982:web:494d6c5d97b252d7800bc7"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

/* ✅ LOAD LEADERBOARD */
function loadLeaderboard() {

    db.collection("scores")
    .orderBy("score", "desc")
    .limit(10)
    .get()
    .then((querySnapshot) => {

        let table = document.getElementById("leaderboardTable");
        let rank = 1;
        let found = false;

        querySnapshot.forEach((doc) => {

            let data = doc.data();

            console.log(data); // 🔥 DEBUG

            if (!data.email) return;

            found = true;

            let row = table.insertRow();

            row.innerHTML = `
                <td>${rank}</td>
                <td>${data.email}</td>
                <td>${data.score}</td>
            `;
            rank++;
        });

        if (!found) {
            document.getElementById("noData").innerText =
                "No leaderboard data found!";
        }
    })
    .catch((error) => {
        console.log("Error:", error);
    });
}

/* BACK BUTTON */
function goBack() {
    window.location.href = "dashboard.html";
}

window.onload = loadLeaderboard;
</script>

</body>
</html>
